version: '3.8'

services:
  investigation-worker:
    build:
      context: .
      dockerfile: ecs/Dockerfile
    container_name: financial-anomaly-investigation-worker
    environment:
      # AWS Configuration (will be overridden by ECS task definition)
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1

      # Application Configuration
      - INVESTIGATION_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/123456789012/investigation-queue
      - INVESTIGATIONS_TABLE=investigations
      - FRAUD_ALERT_TOPIC_ARN=arn:aws:sns:us-east-1:123456789012:fraud-alerts

      # Worker Configuration
      - MAX_MESSAGES_PER_BATCH=10
      - VISIBILITY_TIMEOUT=300
      - WAIT_TIME_SECONDS=20

      # Logging
      - LOG_LEVEL=INFO

    volumes:
      - ./logs:/app/logs

    restart: unless-stopped

    # Resource limits (will be set in ECS task definition)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Local development services (optional)
  localstack:
    image: localstack/localstack:latest
    container_name: financial-anomaly-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3,sns
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./tmp/localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    profiles:
      - development

networks:
  default:
    driver: bridge